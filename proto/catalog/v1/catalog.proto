syntax = "proto3";

package catalog.v1;

enum ItemType {
  ITEM_TYPE_UNSPECIFIED = 0;
  ITEM_TYPE_VIDEO = 1;
  ITEM_TYPE_READING = 2;
  ITEM_TYPE_PRACTICE_QUIZ = 3;
  ITEM_TYPE_GRADED_QUIZ = 4;
  ITEM_TYPE_AUTO_GRADED_LAB = 5;
  ITEM_TYPE_PEER_REVIEW = 6;
}

message InteractiveTranscript {
  int32 timestamp_seconds = 1;
  string text = 2;
}

message InVideoQuiz {
  int32 timestamp_seconds = 1;
  string question = 2;
  repeated string options = 3;
  int32 correct_option_index = 4;
  string explanation = 5;
}

message LearningItem {
  string id = 1;
  string title = 2;
  ItemType type = 3;
  int32 estimated_minutes = 4;
  string video_url = 5;
  string vtt_subtitle_url = 6;
  repeated InteractiveTranscript interactive_transcripts = 7;
  repeated InVideoQuiz in_video_quizzes = 8;
  string reading_markdown = 9;
}

message Lesson {
  string id = 1;
  string title = 2;
  int32 estimated_minutes = 3;
  repeated LearningItem items = 4;
}

message WeekModule {
  string id = 1;
  int32 week_number = 2;
  string title = 3;
  string summary = 4;
  repeated Lesson lessons = 5;
}

message Course {
  string id = 1;
  string title = 2;
  string slug = 3;
  string description = 4;
  string partner_name = 5;
  string partner_logo_url = 6;
  repeated string instructor_names = 7;
  repeated WeekModule week_modules = 8;
  double average_rating = 9;
  int32 review_count = 10;
}

message Specialization {
  string id = 1;
  string title = 2;
  string slug = 3;
  string description = 4;
  string partner_name = 5;
  string partner_logo_url = 6;
  repeated Course courses = 7;
}

message GetSpecializationRequest {
  string id_or_slug = 1;
}

message GetSpecializationResponse {
  Specialization specialization = 1;
}

message ListCoursesRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListCoursesResponse {
  repeated Course courses = 1;
  string next_page_token = 2;
}

message GetCourseDetailRequest {
  string id_or_slug = 1;
}

message GetCourseDetailResponse {
  Course course = 1;
}

message GetLessonDetailRequest {
  string lesson_id = 1;
}

message GetLessonDetailResponse {
  Lesson lesson = 1;
}

message CreateCourseRequest {
  string title = 1;
  string slug = 2;
  string description = 3;
  string partner_name = 4;
  string partner_logo_url = 5;
  repeated string instructor_names = 6;
}

message CreateCourseResponse {
  Course course = 1;
}

message UpdateCourseRequest {
  string id = 1;
  string title = 2;
  string slug = 3;
  string description = 4;
  string partner_name = 5;
  string partner_logo_url = 6;
  repeated string instructor_names = 7;
}

message UpdateCourseResponse {
  Course course = 1;
}

message CreateWeekModuleRequest {
  string course_id = 1;
  int32 week_number = 2;
  string title = 3;
  string summary = 4;
}

message CreateWeekModuleResponse {
  WeekModule week_module = 1;
}

message CreateLessonRequest {
  string course_id = 1;
  string week_module_id = 2;
  string title = 3;
  int32 estimated_minutes = 4;
}

message CreateLessonResponse {
  Lesson lesson = 1;
}

message CreateLearningItemRequest {
  string course_id = 1;
  string lesson_id = 2;
  string title = 3;
  ItemType type = 4;
  int32 estimated_minutes = 5;
  string video_url = 6;
  string reading_markdown = 7;
}

message CreateLearningItemResponse {
  LearningItem item = 1;
}

message CourseReview {
  string id = 1;
  string user_id = 2;
  string user_name = 3;
  string course_id = 4;
  int32 rating_stars = 5;
  string comment_text = 6;
  string created_at = 7;
}

message SubmitCourseReviewRequest {
  string course_id = 1;
  int32 rating_stars = 2;
  string comment_text = 3;
}

message SubmitCourseReviewResponse {
  CourseReview review = 1;
}

message ListCourseReviewsRequest {
  string course_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListCourseReviewsResponse {
  repeated CourseReview reviews = 1;
  double average_rating = 2;
  int32 total_reviews = 3;
  string next_page_token = 4;
}

service CatalogService {
  rpc GetSpecialization(GetSpecializationRequest) returns (GetSpecializationResponse);
  rpc ListCourses(ListCoursesRequest) returns (ListCoursesResponse);
  rpc GetCourseDetail(GetCourseDetailRequest) returns (GetCourseDetailResponse);
  rpc GetLessonDetail(GetLessonDetailRequest) returns (GetLessonDetailResponse);
  rpc CreateCourse(CreateCourseRequest) returns (CreateCourseResponse);
  rpc UpdateCourse(UpdateCourseRequest) returns (UpdateCourseResponse);
  rpc CreateWeekModule(CreateWeekModuleRequest) returns (CreateWeekModuleResponse);
  rpc CreateLesson(CreateLessonRequest) returns (CreateLessonResponse);
  rpc CreateLearningItem(CreateLearningItemRequest) returns (CreateLearningItemResponse);
  rpc SubmitCourseReview(SubmitCourseReviewRequest) returns (SubmitCourseReviewResponse);
  rpc ListCourseReviews(ListCourseReviewsRequest) returns (ListCourseReviewsResponse);
}
