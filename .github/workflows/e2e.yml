name: End-to-End (E2E) Testing CI

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'proto/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'proto/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

jobs:
  e2e-test:
    name: Run Blackbox Playwright E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Buf CLI
        uses: bufbuild/buf-setup-action@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Set up uv for Python Backend
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: "3.13"
          enable-cache: true

      # ── Phase 1: Infrastructure (must be sequential — DB must be up before seed) ────────
      - name: Start PostgreSQL & MinIO Infrastructure
        run: make infra
        working-directory: backend

      # ── Phase 2: Parallel install & stub generation ──────────────────────────────────────
      # Run all independent setup tasks concurrently to minimize CI wall time:
      #   - Backend stub generation (buf → backend/src/gen/)
      #   - Frontend dep install + stub generation (npm ci + buf → frontend/src/gen/)
      #   - E2E dep install + Playwright browser download
      - name: Install dependencies & generate stubs (parallel)
        run: |
          # Backend stubs
          (cd backend && make gen) &
          PID_BE_GEN=$!

          # Frontend deps + stubs
          (cd frontend && npm ci && npm run gen) &
          PID_FE=$!

          # E2E deps + Playwright browsers
          (cd e2e && npm ci && npx playwright install --with-deps chromium) &
          PID_E2E=$!

          # Wait for all parallel tasks and capture exit codes
          wait $PID_BE_GEN || { echo "❌ Backend stub generation failed"; exit 1; }
          wait $PID_FE      || { echo "❌ Frontend install/gen failed"; exit 1; }
          wait $PID_E2E     || { echo "❌ E2E install/playwright failed"; exit 1; }

          echo "✅ All parallel setup tasks completed"

      # ── Phase 3: Seed database (needs infra + backend stubs ready) ───────────────────────
      - name: Seed Database Initial Catalog & Users
        run: make seed
        working-directory: backend

      # ── Phase 4: Start Backend server, then Frontend server ──────────────────────────────
      # FE depends on BE API being up, so BE must start first
      - name: Start Backend & Frontend servers
        run: |
          # Start backend in background
          (cd backend && uv run uvicorn src.main:app --host 0.0.0.0 --port 8000) &

          # Wait for backend to be ready
          echo "⏳ Waiting for backend (port 8000)..."
          for i in {1..30}; do
            curl -sf http://localhost:8000/health && break || sleep 1
          done

          # Start frontend in background (after BE is confirmed up)
          (cd frontend && npm run dev) &

          # Wait for frontend to be ready
          echo "⏳ Waiting for frontend (port 3000)..."
          for i in {1..30}; do
            curl -sf http://localhost:3000 && break || sleep 1
          done

          echo "✅ Backend and Frontend servers are ready"

      # ── Phase 5: Run Playwright E2E Tests ────────────────────────────────────────────────
      - name: Run Playwright E2E Tests
        run: npx playwright test --project=chromium
        working-directory: e2e
        env:
          BASE_URL: http://localhost:3000
          CI: true

      # ── Phase 6: Upload test report artifact (always, even on failure) ───────────────────
      - name: Upload Playwright Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-report
          path: e2e/playwright-report/
          retention-days: 7
